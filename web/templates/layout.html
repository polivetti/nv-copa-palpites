<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NV Copa</title>
  <link rel="stylesheet" href="/static/styles.css">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">Bolao da Copa</p>
      <h1>NV Copa</h1>
    </div>
    <form class="session-form" method="post" action="/logout">
      <span class="pill">{{ .User.Name }}</span>
      <button type="submit" class="ghost-button">Sair</button>
    </form>
  </header>

  {{ template "main" . }}
</body>
</html>
