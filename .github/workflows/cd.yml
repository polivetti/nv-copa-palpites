name: CD

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/nv-copa
  DOMAIN: copa.newvisionsoftware.com.br

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build
    runs-on: self-hosted
    environment:
      name: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

      - name: Pull image
        run: docker pull "${{ env.IMAGE_NAME }}:latest"

      - name: Deploy
        run: |
          cd "${{ secrets.DEPLOY_PATH }}"
          IMAGE="${{ env.IMAGE_NAME }}:latest" docker compose -f docker-compose.prod.yml up -d
          docker image prune -f

      - name: Health check
        run: |
          sleep 5
          curl -sSf --max-time 10 "http://${{ env.DOMAIN }}" -o /dev/null && echo "OK - http://${{ env.DOMAIN }} respondendo" || echo "::warning::App nao responde"
