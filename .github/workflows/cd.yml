name: CD

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/nv-copa

jobs:
  publish-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: prod
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script_stop: true
          envs: IMAGE_NAME
          script: |
            export PATH=$PATH:/usr/bin:/usr/local/bin:/snap/bin:/usr/libexec/docker/cli-plugins
            export IMAGE="${IMAGE_NAME}:latest"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            cd "${{ secrets.DEPLOY_PATH }}"
            docker pull "$IMAGE"
            IMAGE="$IMAGE" docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
