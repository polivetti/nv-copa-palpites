name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download modules
        run: go mod download

      - name: Run tests
        run: go test ./...

      - name: Build binary
        run: go build ./cmd/server

      - name: Build Docker image
        run: docker build -t nv-copa:ci .
